services:
  - type: web
    name: smart-classroom-ai
    runtime: node
    startCommand: npm start
    buildCommand: npm install
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: GEMINI_API_KEY
        sync: false
      - key: FACULTY_USER
        sync: false
      - key: FACULTY_PASS
        sync: false

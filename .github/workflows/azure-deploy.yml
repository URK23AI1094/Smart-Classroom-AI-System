name: Deploy to Azure

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  AZURE_RESOURCE_GROUP: smart-classroom-rg
  AZURE_APP_NAME: smart-classroom-ai
  NODE_VERSION: '18.x'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Check syntax
        run: node -c server.js
      
      - name: Zip artifact for deployment
        run: |
          zip -r app.zip . -x "node_modules/*" ".git/*" ".github/*" ".env*"
      
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: node-app
          path: app.zip
          retention-days: 1

  deploy-to-azure:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v3
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      
      - name: Create or get resource group
        run: |
          az group create \
            --name ${{ env.AZURE_RESOURCE_GROUP }} \
            --location eastus || true
      
      - name: Deploy Azure App Service
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_APP_NAME }}
          package: app.zip
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
      
      - name: Configure App Service settings
        run: |
          az webapp config appsettings set \
            --resource-group ${{ env.AZURE_RESOURCE_GROUP }} \
            --name ${{ env.AZURE_APP_NAME }} \
            --settings \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              PORT=3000 \
              NODE_ENV=production \
              WEBSITE_NODE_DEFAULT_VERSION=18.x
      
      - name: Deployment successful
        run: echo "✅ Deployed to Azure App Service"

  notify:
    runs-on: ubuntu-latest
    if: always()
    needs: [build, deploy-to-azure]
    
    steps:
      - name: Check deployment status
        run: |
          if [ "${{ needs.build.result }}" == "success" ]; then
            echo "✅ Build successful"
            if [ "${{ needs.deploy-to-azure.result }}" == "success" ]; then
              echo "✅ Deployment to Azure successful!"
            fi
          fi
